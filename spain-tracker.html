<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="España"/>
  <meta name="theme-color" content="#0f1117"/>
  <title>Días en España</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #22263a;
      --text: #f0f0f0;
      --text2: #9aa0b8;
      --text3: #5a6080;
      --border: rgba(255,255,255,0.08);
      --green: #1D9E75;
      --orange: #EF9F27;
      --red: #E24B4A;
      --radius: 14px;
      --radius-sm: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }
    .app { max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .year-select {
      background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 14px; padding: 6px 10px; outline: none;
    }
    .arc-wrap { display: flex; flex-direction: column; align-items: center; margin: 8px 0 20px; }
    .arc-svg { width: 260px; height: 155px; }
    .arc-center { text-align: center; margin-top: 4px; }
    .arc-pct { font-size: 42px; font-weight: 700; line-height: 1; }
    .arc-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
    .status-bar { height: 5px; border-radius: 3px; background: var(--bg3); margin: 0 0 20px; overflow: hidden; }
    .status-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease, background 0.5s ease; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 14px; }
    .card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .card-val { font-size: 28px; font-weight: 600; line-height: 1; }
    .card-unit { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
    .btn-add-toggle {
      background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text2); font-size: 12px; padding: 6px 12px; cursor: pointer;
    }
    .period-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .period-item {
      background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
      padding: 12px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .period-dates { font-size: 14px; color: var(--text); }
    .period-days { font-size: 13px; font-weight: 600; color: var(--text2); margin-right: 12px; }
    .period-del {
      background: none; border: none; cursor: pointer; color: var(--text3);
      font-size: 20px; line-height: 1; padding: 2px 4px;
    }
    .empty-hint { font-size: 14px; color: var(--text3); text-align: center; padding: 20px 0; }
    .add-form {
      background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius);
      padding: 16px; margin-top: 8px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .form-group label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input[type="date"] {
      width: 100%; background: var(--bg3); border: 0.5px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
      padding: 9px 10px; outline: none; -webkit-appearance: none;
    }
    .btn-save {
      width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
      border-radius: var(--radius-sm); border: none; background: #1a3a2a;
      color: #1D9E75; cursor: pointer;
    }
    .btn-save:active { opacity: 0.7; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🇪🇸 Días en España</h1>
    <select class="year-select" id="year-select"></select>
  </div>

  <div class="arc-wrap">
    <svg class="arc-svg" viewBox="0 0 260 155" xmlns="http://www.w3.org/2000/svg">
      <path id="arc-bg" fill="none" stroke="#22263a" stroke-width="16" stroke-linecap="round"/>
      <path id="arc-fill" fill="none" stroke-width="16" stroke-linecap="round" style="display:none"/>
    </svg>
    <div class="arc-center">
      <div class="arc-pct" id="arc-pct">0%</div>
      <div class="arc-sub">del límite del 50% usado</div>
    </div>
  </div>

  <div class="status-bar"><div class="status-fill" id="status-fill"></div></div>

  <div class="cards">
    <div class="card">
      <div class="card-label">Días en España</div>
      <div class="card-val" id="val-used">0</div>
      <div class="card-unit">de <span id="val-limit">182</span> máx.</div>
    </div>
    <div class="card">
      <div class="card-label">Días restantes</div>
      <div class="card-val" id="val-left" style="color:var(--green)">182</div>
      <div class="card-unit">disponibles</div>
    </div>
    <div class="card">
      <div class="card-label">Porcentaje</div>
      <div class="card-val" id="val-pct2">0%</div>
      <div class="card-unit">del límite usado</div>
    </div>
    <div class="card">
      <div class="card-label">Períodos</div>
      <div class="card-val" id="val-periods">0</div>
      <div class="card-unit">registrados</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Períodos</div>
    <button class="btn-add-toggle" id="toggle-btn" onclick="toggleForm()">+ Añadir</button>
  </div>

  <div class="period-list" id="period-list">
    <div class="empty-hint">Añade tu primer período</div>
  </div>

  <div class="add-form" id="add-form" style="display:none">
    <div class="form-row">
      <div class="form-group">
        <label>Llegada</label>
        <input type="date" id="date-start"/>
      </div>
      <div class="form-group">
        <label>Salida</label>
        <input type="date" id="date-end"/>
      </div>
    </div>
    <button class="btn-save" onclick="addPeriod()">Guardar</button>
  </div>
</div>

<script>
const KEY = 'spain_tracker_v1';
let data = {};
try { data = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) {}
let year = new Date().getFullYear();

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function isLeap(y) { return (y%4===0 && y%100!==0) || y%400===0; }
function yearDays(y) { return isLeap(y) ? 366 : 365; }
function diffDays(a, b) { return Math.round((new Date(b) - new Date(a)) / 86400000) + 1; }
function fmtDate(d) {
  const [y,m,day] = d.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function getYears() {
  const ys = new Set([new Date().getFullYear()]);
  Object.keys(data).forEach(k => ys.add(parseInt(k)));
  return Array.from(ys).sort((a,b) => b-a);
}

function drawArc(pct) {
  const cx=130, cy=135, r=110;
  const sa = Math.PI*1.1, ea = Math.PI*1.9;
  function pt(a) { return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
  function path(from, to) {
    const [sx,sy]=pt(from), [ex,ey]=pt(to);
    return `M ${sx} ${sy} A ${r} ${r} 0 ${to-from>Math.PI?1:0} 1 ${ex} ${ey}`;
  }
  document.getElementById('arc-bg').setAttribute('d', path(sa,ea));
  const filled = Math.min(pct/100,1)*(ea-sa);
  const arc = document.getElementById('arc-fill');
  if (filled > 0.01) {
    arc.setAttribute('d', path(sa, sa+filled));
    arc.setAttribute('stroke', pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#1D9E75');
    arc.style.display='';
  } else { arc.style.display='none'; }
}

function render() {
  const ys = getYears();
  const sel = document.getElementById('year-select');
  sel.innerHTML = ys.map(y2=>`<option value="${y2}" ${y2===year?'selected':''}>${y2}</option>`).join('');
  sel.onchange = () => { year=parseInt(sel.value); render(); };

  const total = yearDays(year);
  const limit = Math.floor(total/2);
  const periods = data[year] || [];
  const used = periods.reduce((s,p)=>s+diffDays(p.start,p.end),0);
  const left = Math.max(limit-used,0);
  const pct = Math.round((used/limit)*100);
  const color = pct>=100?'#E24B4A':pct>=80?'#EF9F27':'#1D9E75';

  document.getElementById('val-used').textContent = used;
  document.getElementById('val-limit').textContent = limit;
  document.getElementById('val-left').textContent = left;
  document.getElementById('val-left').style.color = color;
  document.getElementById('val-pct2').textContent = pct+'%';
  document.getElementById('val-pct2').style.color = color;
  document.getElementById('val-periods').textContent = periods.length;
  document.getElementById('arc-pct').textContent = pct+'%';
  document.getElementById('arc-pct').style.color = color;

  const sf = document.getElementById('status-fill');
  sf.style.width = Math.min(pct,100)+'%';
  sf.style.background = color;

  drawArc(pct);

  const list = document.getElementById('period-list');
  if (!periods.length) {
    list.innerHTML = '<div class="empty-hint">Añade tu primer período</div>';
  } else {
    list.innerHTML = periods.map((p,i)=>`
      <div class="period-item">
        <div class="period-dates">${fmtDate(p.start)} → ${fmtDate(p.end)}</div>
        <div style="display:flex;align-items:center">
          <span class="period-days">${diffDays(p.start,p.end)}d</span>
          <button class="period-del" onclick="del(${i})" aria-label="Eliminar">×</button>
        </div>
      </div>`).join('');
  }
}

function toggleForm() {
  const f = document.getElementById('add-form');
  const open = f.style.display==='none';
  f.style.display = open?'':'none';
  document.getElementById('toggle-btn').textContent = open?'× Cerrar':'+ Añadir';
  if (open) {
    const t = new Date().toISOString().slice(0,10);
    document.getElementById('date-start').value = t;
    document.getElementById('date-end').value = t;
  }
}

function addPeriod() {
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  if (!s||!e||s>e) { alert('Fechas inválidas'); return; }
  const y = parseInt(s.slice(0,4));
  if (!data[y]) data[y]=[];
  data[y].push({start:s,end:e});
  data[y].sort((a,b)=>a.start.localeCompare(b.start));
  save(); year=y; toggleForm(); render();
}

function del(i) {
  if (!confirm('¿Eliminar este período?')) return;
  data[year].splice(i,1);
  if (!data[year].length) delete data[year];
  save(); render();
}

render();
</script>
</body>
</html>
