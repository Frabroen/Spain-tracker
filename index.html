<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Españolito"/>
  <meta name="theme-color" content="#0f1117"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <link rel="icon" href="icon.png"/>
  <title>Españolito</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --bg2: #1a1d27; --bg3: #22263a;
      --text: #f0f0f0; --text2: #9aa0b8; --text3: #5a6080;
      --border: rgba(255,255,255,0.08);
      --red: #C60B1E; --yellow: #F1BF00;
      --radius: 14px; --radius-sm: 8px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding: env(safe-area-inset-top,16px) 0 0 0; }
    .app { max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .year-select { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 6px 10px; outline: none; }
    .arc-wrap { display: flex; flex-direction: column; align-items: center; margin: 8px 0 4px; }
    .arc-svg { width: 260px; height: 155px; }
    .arc-center { text-align: center; margin-top: 6px; margin-bottom: 4px; }
    .arc-pct-used { font-size: 38px; font-weight: 700; color: var(--red); line-height: 1; }
    .arc-pct-total { font-size: 15px; font-weight: 500; color: var(--text); margin-top: 3px; }
    .arc-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .legend { display: flex; gap: 20px; justify-content: center; margin: 8px 0 16px; }
    .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-bar { height: 5px; border-radius: 3px; background: var(--bg3); margin: 0 0 20px; overflow: hidden; display: flex; }
    .status-seg { height: 100%; transition: width 0.5s ease; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
    .card-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .card-val { font-size: 28px; font-weight: 600; line-height: 1; }
    .card-unit { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .section-title { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
    .btn-toggle { background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text2); font-size: 12px; padding: 6px 12px; cursor: pointer; }
    .period-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .period-item { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
    .period-dates { font-size: 14px; color: var(--text); }
    .period-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; margin-right: 8px; }
    .badge-past { background: rgba(198,11,30,0.15); color: var(--red); }
    .badge-future { background: rgba(241,191,0,0.15); color: var(--yellow); }
    .period-days { font-size: 13px; font-weight: 600; color: var(--text2); margin-right: 8px; }
    .period-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px 4px; }
    .empty-hint { font-size: 14px; color: var(--text3); text-align: center; padding: 20px 0; }

    .cal-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; margin-top: 8px; }
    .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-nav-btn { background: var(--bg3); border: none; border-radius: var(--radius-sm); color: var(--text2); width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .cal-month-label { font-size: 15px; font-weight: 600; color: var(--text); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-dow { font-size: 10px; color: var(--text3); text-align: center; padding: 4px 0; }
    .cal-day { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; color: var(--text); border-radius: 0; position: relative; -webkit-tap-highlight-color: transparent; user-select: none; }
    .cal-day.empty { pointer-events: none; }
    .cal-day.other-month { color: var(--text3); }
    .cal-day.today::after { content:''; position:absolute; bottom:4px; left:50%; transform:translateX(-50%); width:4px; height:4px; border-radius:50%; background:var(--yellow); }
    .cal-day.start { background: var(--red); border-radius: 8px 0 0 8px; color: white; font-weight: 700; }
    .cal-day.end { background: var(--red); border-radius: 0 8px 8px 0; color: white; font-weight: 700; }
    .cal-day.start.end { border-radius: 8px; }
    .cal-day.inrange { background: rgba(198,11,30,0.18); }
    .cal-hint { font-size: 12px; color: var(--text3); text-align: center; margin: 10px 0 8px; }
    .cal-selection { display: flex; gap: 8px; margin-bottom: 12px; }
    .cal-sel-box { flex: 1; background: var(--bg3); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
    .cal-sel-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
    .cal-sel-val { font-size: 14px; font-weight: 600; color: var(--red); }
    .cal-sel-val.empty { color: var(--text3); font-weight: 400; }
    .btn-save { width: 100%; padding: 12px; font-size: 15px; font-weight: 600; border-radius: var(--radius-sm); border: none; background: rgba(198,11,30,0.15); color: var(--red); cursor: pointer; }
    .btn-save:disabled { opacity: 0.3; cursor: default; }
    .btn-save:active:not(:disabled) { opacity: 0.7; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🇪🇸 Días en España</h1>
    <select class="year-select" id="year-select"></select>
  </div>

  <div class="arc-wrap">
    <svg class="arc-svg" viewBox="0 0 260 155" xmlns="http://www.w3.org/2000/svg">
      <path id="arc-bg" fill="none" stroke="#22263a" stroke-width="16" stroke-linecap="round"/>
      <path id="arc-used" fill="none" stroke="#C60B1E" stroke-width="16" stroke-linecap="round" style="display:none"/>
      <path id="arc-planned" fill="none" stroke="#F1BF00" stroke-width="16" stroke-linecap="round" style="display:none"/>
    </svg>
    <div class="arc-center">
      <div class="arc-pct-used" id="arc-pct-used">0%</div>
      <div class="arc-pct-total" id="arc-pct-total" style="display:none"></div>
      <div class="arc-sub">del límite del 50% anual</div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#C60B1E"></div>Usados</div>
    <div class="leg-item"><div class="leg-dot" style="background:#F1BF00"></div>Planificados</div>
  </div>

  <div class="status-bar">
    <div class="status-seg" id="bar-used" style="background:#C60B1E;width:0%"></div>
    <div class="status-seg" id="bar-planned" style="background:#F1BF00;width:0%"></div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label">Días usados</div>
      <div class="card-val" id="val-used" style="color:#C60B1E">0</div>
      <div class="card-unit">días pasados</div>
    </div>
    <div class="card">
      <div class="card-label">Planificados</div>
      <div class="card-val" id="val-planned" style="color:#F1BF00">0</div>
      <div class="card-unit">días futuros</div>
    </div>
    <div class="card">
      <div class="card-label">Restantes</div>
      <div class="card-val" id="val-left" style="color:#C60B1E">182</div>
      <div class="card-unit">de <span id="val-limit">182</span> máx.</div>
    </div>
    <div class="card">
      <div class="card-label">Total comprometido</div>
      <div class="card-val" id="val-total">0</div>
      <div class="card-unit">pasado + futuro</div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Períodos</div>
    <button class="btn-toggle" id="toggle-btn" onclick="toggleCal()">+ Añadir</button>
  </div>

  <div class="period-list" id="period-list">
    <div class="empty-hint">Añade tu primer período</div>
  </div>

  <div id="cal-container" style="display:none">
    <div class="cal-box">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-hint" id="cal-hint">Selecciona la fecha de llegada</div>
      <div class="cal-selection">
        <div class="cal-sel-box">
          <div class="cal-sel-label">Llegada</div>
          <div class="cal-sel-val empty" id="sel-start">—</div>
        </div>
        <div class="cal-sel-box">
          <div class="cal-sel-label">Salida</div>
          <div class="cal-sel-val empty" id="sel-end">—</div>
        </div>
      </div>
      <button class="btn-save" id="btn-save" disabled onclick="savePeriod()">Guardar período</button>
    </div>
  </div>
</div>

<script>
const KEY = 'spain_tracker_v1';
let data = {};
try { data = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch(e) {}
let year = new Date().getFullYear();
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DOWS = ['L','M','X','J','V','S','D'];
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let selStart = null, selEnd = null;

function save() { localStorage.setItem(KEY, JSON.stringify(data)); }
function isLeap(y) { return (y%4===0&&y%100!==0)||y%400===0; }
function yearDays(y) { return isLeap(y)?366:365; }
function diffDays(a,b) { return Math.round((new Date(b)-new Date(a))/86400000)+1; }
function pad(n) { return String(n).padStart(2,'0'); }
function toStr(y,m,d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function fmtShort(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${parseInt(d)} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m)-1]}`;
}
function fmtFull(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${parseInt(d)} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(m)-1]} ${y}`;
}

function getYears() {
  const ys = new Set([new Date().getFullYear()]);
  Object.keys(data).forEach(k => ys.add(parseInt(k)));
  return Array.from(ys).sort((a,b) => b-a);
}

function drawArc(pctUsed, pctPlanned) {
  const cx=130, cy=135, r=110;
  const sa=Math.PI*1.1, ea=Math.PI*1.9, total=ea-sa;
  function pt(a) { return [cx+r*Math.cos(a), cy+r*Math.sin(a)]; }
  function path(from,to) {
    const [sx,sy]=pt(from),[ex,ey]=pt(to);
    return `M ${sx} ${sy} A ${r} ${r} 0 ${to-from>Math.PI?1:0} 1 ${ex} ${ey}`;
  }
  document.getElementById('arc-bg').setAttribute('d', path(sa,ea));
  const usedArc = Math.min(pctUsed/100,1)*total;
  const plannedArc = Math.min(pctPlanned/100,1)*total;
  const maxP = total-usedArc;
  const arcU = document.getElementById('arc-used');
  if (usedArc>0.01) { arcU.setAttribute('d',path(sa,sa+usedArc)); arcU.style.display=''; }
  else arcU.style.display='none';
  const arcP = document.getElementById('arc-planned');
  const actualP = Math.min(plannedArc,maxP);
  if (actualP>0.01) { arcP.setAttribute('d',path(sa+usedArc,sa+usedArc+actualP)); arcP.style.display=''; }
  else arcP.style.display='none';
}

function render() {
  const ys = getYears();
  const sel = document.getElementById('year-select');
  sel.innerHTML = ys.map(y2=>`<option value="${y2}" ${y2===year?'selected':''}>${y2}</option>`).join('');
  sel.onchange = () => { year=parseInt(sel.value); render(); };

  const total = yearDays(year);
  const limit = Math.floor(total/2);
  const today = new Date().toISOString().slice(0,10);
  const periods = data[year] || [];

  const usedDays = periods.filter(p=>p.end<today).reduce((s,p)=>s+diffDays(p.start,p.end),0);
  const ongoingDays = periods.filter(p=>p.start<=today&&p.end>=today).reduce((s,p)=>s+diffDays(p.start,p.end),0);
  const plannedDays = periods.filter(p=>p.start>today).reduce((s,p)=>s+diffDays(p.start,p.end),0);
  const totalUsed = usedDays+ongoingDays;
  const totalCommitted = totalUsed+plannedDays;
  const left = Math.max(limit-totalCommitted,0);
  const pctUsed = Math.round((totalUsed/limit)*100);
  const pctPlanned = Math.round((plannedDays/limit)*100);
  const pctTotal = Math.round((totalCommitted/limit)*100);

  document.getElementById('val-used').textContent = totalUsed;
  document.getElementById('val-planned').textContent = plannedDays;
  document.getElementById('val-left').textContent = left;
  document.getElementById('val-limit').textContent = limit;
  document.getElementById('val-total').textContent = totalCommitted;
  document.getElementById('arc-pct-used').textContent = pctUsed+'%';
  const totEl = document.getElementById('arc-pct-total');
  if (plannedDays>0) { totEl.textContent=`+ ${pctPlanned}% planificado = ${pctTotal}%`; totEl.style.display=''; }
  else totEl.style.display='none';
  document.getElementById('bar-used').style.width = Math.min(pctUsed,100)+'%';
  document.getElementById('bar-planned').style.width = Math.min(pctPlanned,Math.max(100-pctUsed,0))+'%';
  drawArc(pctUsed, pctPlanned);

  const list = document.getElementById('period-list');
  if (!periods.length) {
    list.innerHTML = '<div class="empty-hint">Añade tu primer período</div>';
  } else {
    list.innerHTML = periods.map((p,i) => {
      const days = diffDays(p.start,p.end);
      const future = p.start>today;
      const past = p.end<today;
      const badge = future ? '<span class="period-badge badge-future">futuro</span>'
        : past ? '<span class="period-badge badge-past">pasado</span>'
        : '<span class="period-badge badge-past">en curso</span>';
      return `<div class="period-item">
        <div class="period-dates">${fmtFull(p.start)} → ${fmtFull(p.end)}</div>
        <div style="display:flex;align-items:center">
          ${badge}
          <span class="period-days">${days}d</span>
          <button class="period-del" onclick="delPeriod(${i})">×</button>
        </div>
      </div>`;
    }).join('');
  }
}

function renderCal() {
  document.getElementById('cal-month-label').textContent = MONTHS[calMonth]+' '+calYear;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(calYear,calMonth,1).getDay();
  const offset = first===0?6:first-1;
  const days = new Date(calYear,calMonth+1,0).getDate();
  const today = new Date().toISOString().slice(0,10);
  const lo = selStart&&selEnd ? (selStart<selEnd?selStart:selEnd) : selStart;
  const hi = selStart&&selEnd ? (selStart<selEnd?selEnd:selStart) : null;

  for (let i=0;i<offset;i++) grid.innerHTML+=`<div class="cal-day empty"></div>`;
  for (let d=1;d<=days;d++) {
    const ds = toStr(calYear,calMonth,d);
    let cls = 'cal-day';
    if (ds===today) cls+=' today';
    if (lo&&hi) {
      if (ds===lo) cls+=' start';
      else if (ds===hi) cls+=' end';
      else if (ds>lo&&ds<hi) cls+=' inrange';
    } else if (selStart&&ds===selStart) cls+=' start end';
    const day = d;
    grid.innerHTML+=`<div class="${cls}" data-d="${ds}">${day}</div>`;
  }

  grid.querySelectorAll('.cal-day[data-d]').forEach(el => {
    el.addEventListener('click', () => {
      const ds = el.getAttribute('data-d');
      if (!selStart || (selStart&&selEnd)) {
        selStart=ds; selEnd=null;
        document.getElementById('cal-hint').textContent='Ahora selecciona la fecha de salida';
      } else {
        selEnd=ds;
        if (selEnd<selStart) { const tmp=selStart; selStart=selEnd; selEnd=tmp; }
        document.getElementById('cal-hint').textContent='Período seleccionado ✓';
      }
      document.getElementById('sel-start').textContent=fmtShort(selStart);
      document.getElementById('sel-start').className='cal-sel-val'+(selStart?'':' empty');
      document.getElementById('sel-end').textContent=fmtShort(selEnd)||'—';
      document.getElementById('sel-end').className='cal-sel-val'+(selEnd?'':' empty');
      document.getElementById('btn-save').disabled=!(selStart&&selEnd);
      renderCal();
    });
  });
}

function changeMonth(dir) {
  calMonth+=dir;
  if (calMonth>11) { calMonth=0; calYear++; }
  if (calMonth<0) { calMonth=11; calYear--; }
  renderCal();
}

function toggleCal() {
  const c = document.getElementById('cal-container');
  const open = c.style.display==='none';
  c.style.display=open?'':'none';
  document.getElementById('toggle-btn').textContent=open?'× Cerrar':'+ Añadir';
  if (open) {
    selStart=null; selEnd=null;
    calYear=new Date().getFullYear(); calMonth=new Date().getMonth();
    document.getElementById('cal-hint').textContent='Selecciona la fecha de llegada';
    document.getElementById('sel-start').textContent='—'; document.getElementById('sel-start').className='cal-sel-val empty';
    document.getElementById('sel-end').textContent='—'; document.getElementById('sel-end').className='cal-sel-val empty';
    document.getElementById('btn-save').disabled=true;
    renderCal();
  }
}

function savePeriod() {
  if (!selStart||!selEnd) return;
  const y = parseInt(selStart.slice(0,4));
  if (!data[y]) data[y]=[];
  data[y].push({start:selStart,end:selEnd});
  data[y].sort((a,b)=>a.start.localeCompare(b.start));
  save(); year=y; toggleCal(); render();
}

function delPeriod(i) {
  if (!confirm('¿Eliminar este período?')) return;
  data[year].splice(i,1);
  if (!data[year].length) delete data[year];
  save(); render();
}

render();
</script>
</body>
</html>
